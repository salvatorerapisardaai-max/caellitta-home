<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="g2" x1="0" x2="1"><stop offset="0" stop-color="#071013"/><stop offset="1" stop-color="#0b1020"/></linearGradient>
    <style>
      .bg{fill:url(#g2)}
      .card{fill:#07121a;stroke:#21303a;rx:8}
      .muted{fill:#9aa6b2;font-family:Arial,Helvetica,sans-serif;font-size:13px}
      .day{fill:#e6eef6;font-family:Arial,Helvetica,sans-serif;font-size:14px}
      .booked{fill:#7dcca0}
      .checkin{fill:#7ab8d4}
    </style>
  </defs>
  <rect class="bg" width="1200" height="675" rx="12"/>
  <g transform="translate(40,40)">
    <text class="day" x="0" y="28">Caellitta — Calendar (mockup)</text>

    <rect class="card" x="0" y="60" width="1120" height="520" rx="10"/>

    <!-- Month header -->
    <text class="muted" x="24" y="104">July 2026</text>

    <!-- Calendar grid (4 rows x 7 cols) -->
    <g transform="translate(24,120)">
      <!-- day labels -->
      <g class="muted" transform="translate(0,0)">
        <text x="0" y="0">Mon</text>
        <text x="150" y="0">Tue</text>
        <text x="300" y="0">Wed</text>
        <text x="450" y="0">Thu</text>
        <text x="600" y="0">Fri</text>
        <text x="750" y="0">Sat</text>
        <text x="900" y="0">Sun</text>
      </g>

      <!-- grid cells -->
      ${Array.from({length:4}).map((_,r)=>{
        return `<g transform="translate(0,${40 + r*110})">` + Array.from({length:7}).map((_,c)=>{
          const x = c*150
          return `\n  <rect x="${x}" y="0" width="140" height="100" rx="8" fill="#081018" stroke="#17303a"/>\n  <text x="${x+12}" y="22" class="day">${r*7 + c + 1}</text>`
        }).join('') + `\n</g>`
      }).join('')}

    </g>

    <!-- Example bookings (faux) -->
    <rect x="180" y="170" width="320" height="28" rx="6" class="booked"/>
    <text class="muted" x="188" y="190">Rossi — 1 Jul → 4 Jul • 3 nights</text>

    <rect x="630" y="280" width="150" height="28" rx="6" class="checkin"/>
    <text class="muted" x="638" y="300">Bianchi — check-in 5 Jul</text>

    <rect x="960" y="360" width="200" height="28" rx="6" class="booked"/>
    <text class="muted" x="968" y="380">Smith — 12 Jul → 17 Jul • 5 nights</text>

  </g>
</svg>
